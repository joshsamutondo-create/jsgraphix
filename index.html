<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>JJ OS</title>

    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script defer src="script.js"></script>
  </head>

  <body>
    <div id="wallpaper"></div>

    <div id="desktopOverlay"></div>

    <!-- =========================
     DESKTOP
========================= -->

    <div id="desktop">
      <!-- Desktop Icons -->

      <div class="desktopIcon" data-app="notes">
        <div class="iconImage">📝</div>

        <span>Notes</span>
      </div>

      <div class="desktopIcon" data-app="calculator">
        <div class="iconImage">🧮</div>

        <span>Calculator</span>
      </div>

      <div class="desktopIcon" data-app="calendar">
        <div class="iconImage">📅</div>

        <span>Calendar</span>
      </div>

      <div class="desktopIcon" data-app="paint">
        <div class="iconImage">🎨</div>

        <span>Paint</span>
      </div>

      <div class="desktopIcon" data-app="weather">
        <div class="iconImage">🌤</div>

        <span>Weather</span>
      </div>

      <div class="desktopIcon" data-app="music">
        <div class="iconImage">🎵</div>

        <span>Music</span>
      </div>

      <div class="desktopIcon" data-app="files">
        <div class="iconImage">📁</div>

        <span>Files</span>
      </div>
    </div>

    <!-- =========================
     WINDOWS
========================= -->

    <div id="windowContainer"></div>

    <!-- =========================
     START MENU
========================= -->

    <div id="startMenu">
      <div class="startHeader">
        <h2>JJ OS</h2>

        <p>Version 0.1 Alpha</p>
      </div>

      <input type="text" id="startSearch" placeholder="Search apps..." />

      <div id="appGrid">
        <button class="appButton" data-app="notes">
          📝

          <span>Notes</span>
        </button>

        <button class="appButton" data-app="calculator">
          🧮

          <span>Calculator</span>
        </button>

        <button class="appButton" data-app="calendar">
          📅

          <span>Calendar</span>
        </button>

        <button class="appButton" data-app="paint">
          🎨

          <span>Paint</span>
        </button>

        <button class="appButton" data-app="weather">
          🌤

          <span>Weather</span>
        </button>

        <button class="appButton" data-app="music">
          🎵

          <span>Music</span>
        </button>

        <button class="appButton" data-app="files">
          📁

          <span>Files</span>
        </button>

        <button class="appButton" data-app="settings">
          ⚙️

          <span>Settings</span>
        </button>
      </div>
    </div>

    <!-- =========================
     NOTIFICATIONS
========================= -->

    <div id="notificationCenter"></div>

    <!-- =========================
     TASKBAR
========================= -->

    <div id="taskbar">
      <button id="startButton">⊞</button>

      <input id="taskbarSearch" type="text" placeholder="Search JJ OS" />

      <div id="runningApps"></div>

      <div id="systemTray">
        <span id="wifi"> 📶 </span>

        <span id="battery"> 🔋100% </span>

        <span id="clock"> 00:00 </span>
      </div>
    </div>
    <!-- =========================
     RIGHT CLICK MENU
========================= -->

    <div id="contextMenu">
      <button id="refreshDesktop">🔄 Refresh</button>

      <button id="newFolder">📁 New Folder</button>

      <button id="changeWallpaper">🖼 Change Wallpaper</button>

      <button id="personalize">🎨 Personalize</button>
    </div>

    <!-- =========================
     BOOT SCREEN
========================= -->

    <div id="bootScreen">
      <div class="bootLogo">
        <h1>JJ OS</h1>

        <p>Version 0.1 Alpha</p>
      </div>

      <div class="loader">
        <div></div>
        <div></div>
        <div></div>
      </div>

      <p class="bootText">Starting JJ OS...</p>
    </div>

    <!-- =========================
     LOCK SCREEN
========================= -->

    <div id="lockScreen">
      <div class="lockContent">
        <h1 id="lockTime">00:00</h1>

        <p id="lockDate">Monday</p>

        <button id="unlockButton">Click to Unlock</button>
      </div>
    </div>

    <!-- =========================
     SHUTDOWN DIALOG
========================= -->

    <div id="shutdownOverlay">
      <div id="shutdownBox">
        <h2>Power Options</h2>

        <button id="restartBtn">🔄 Restart</button>

        <button id="shutdownBtn">⏻ Shutdown</button>

        <button id="cancelShutdown">Cancel</button>
      </div>
    </div>

    <!-- =========================
     WINDOW TEMPLATE
========================= -->

    <template id="windowTemplate">
      <div class="window">
        <div class="titleBar">
          <div class="windowTitle">
            <span class="windowIcon"> 📄 </span>

            <span class="windowName"> Application </span>
          </div>

          <div class="windowControls">
            <button class="minimize">—</button>

            <button class="maximize">□</button>

            <button class="close">✕</button>
          </div>
        </div>

        <div class="windowContent"></div>
      </div>
    </template>
  </body>
</html>
<script defer src="core/windowManager.js"></script>
<script defer src="main.js"></script>
